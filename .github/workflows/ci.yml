name: CI Workflow

on:
  push:
    branches:
      - "dev"
      - "main"
  pull_request:
    branches:
      - "dev"
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 설정 (Gradle 빌드에 사용할 JDK 버전 설정)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 캐시 설정 (의존성 캐시를 통해 빌드 속도 향상)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # application-S3.properties 생성
      - name: Create application-s3.properties
        env: # 환경 변수로 GitHub Secrets 값을 읽어옵니다.
          APP_CONFIG_FILE: src/main/resources/secret/application-s3.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "cloud.aws.credentials.access-key=${{ secrets.AWS_S3_ACCESS_KEY_ID }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.credentials.secret-key=${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.stack.auto=false" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.s3.bucket=${{ secrets.S3_BUCKET }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.region.static=${{ secrets.AWS_REGION }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.s3.bucket.url=${{ secrets.S3_BUCKET_URL }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.s3.signature-version=v4" >> ${APP_CONFIG_FILE}

      # api-key.properties 생성
      - name: Create api-key.properties
        env: # 환경 변수로 GitHub Secrets 값을 읽어옵니다.
          APP_CONFIG_FILE: src/main/resources/secret/api-key.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "kakao.rest.key=${{ secrets.KAKAO_REST_KEY }}" >> ${APP_CONFIG_FILE}

      # jwt key 생성
      - name: Create jwt-secret-keys.properties
        env:
          APP_CONFIG_FILE: src/main/resources/secret/jwt-secret-key.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "jwt.secret=${{ secrets.JWT_SECRET_KEY }}" >> ${APP_CONFIG_FILE}

      # aes-key.properties 생성
      - name: Create aes-key.properties
        env: # 환경 변수로 GitHub Secrets 값을 읽어옵니다.
          APP_CONFIG_FILE: src/main/resources/secret/aes-key.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "security.aes.algorithm=${{ secrets.AES_ALGORITHM }}" >> ${APP_CONFIG_FILE}
          echo "security.aes.key=${{ secrets.AES_KEY }}" >> ${APP_CONFIG_FILE}
          echo "security.aes.iv=${{ secrets.AES_IV }}" >> ${APP_CONFIG_FILE}

      # 4. Gradle 빌드 및 테스트 실행
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and test with Gradle
        run: |
          ./gradlew clean build
          ./gradlew test

      # 5. 테스트 결과 출력
      - name: Upload Test Results
        if: failure()  # 실패한 경우에만 결과를 업로드합니다.
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test
          retention-days: 7  # 7일 동안 저장 후 만료

  notify-discord:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Discord 알림 (빌드 성공/실패)
      - name: Notify Discord
        uses: ./.github/actions/notify-discord
        with:
          branch-type : ${{ github.ref_name }}
          build-result : ${{ needs.build.result }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
