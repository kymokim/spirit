name: CD Workflow

on:
  workflow_run:
    workflows:
      - "CI Workflow" # CI 워크플로우의 이름을 참조
    types:
      - completed

env:
  ECR_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY_NAME }}

jobs:
  setup-env:
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.set-profile.outputs.profile }}
      service: ${{ steps.set-service.outputs.service }}
    steps:
      - name: Set PROFILE
        id: set-profile
        run: |
          if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            echo "profile=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.workflow_run.head_branch }}" == "dev" ]]; then
            echo "profile=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set SERVICE
        id: set-service
        run: |
          SERVICE=$(basename ${GITHUB_REPOSITORY})
          echo "service=${SERVICE}" >> $GITHUB_OUTPUT

  build:
    if: ${{ github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    needs: setup-env
    env:
      PROFILE: ${{ needs.setup-env.outputs.profile }}
      SERVICE: ${{ needs.setup-env.outputs.service }}
    steps:
      # 1. GitHub 저장소 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

        # 2. Java 버전 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set DB_URL to prod
        id: set-prod-db
        if: ${{ env.PROFILE == 'prod' }}
        run: |
          echo "DB_URL=${{ secrets.DB_URL_PROD }}" >> $GITHUB_ENV

      - name: Set DB_URL to dev
        id: set-dev-db
        if: ${{ env.PROFILE == 'dev' }}
        run: |
          echo "DB_URL=${{ secrets.DB_URL_DEV }}" >> $GITHUB_ENV

      - name: Create application.yml dynamically
        env: # 환경 변수로 GitHub Secrets 값을 읽어옵니다.
          APP_CONFIG_FILE: src/main/resources/application-${{ env.PROFILE }}.yml
        run: |
          echo "spring:" >> ${APP_CONFIG_FILE}
          echo "  datasource:" >> ${APP_CONFIG_FILE}
          echo "    driver-class-name: org.mariadb.jdbc.Driver" >> ${APP_CONFIG_FILE}
          echo "    url: ${DB_URL}" >> ${APP_CONFIG_FILE}
          echo "    username: ${{ secrets.DB_USERNAME }}" >> ${APP_CONFIG_FILE}
          echo "    password: ${{ secrets.DB_PASSWORD }}" >> ${APP_CONFIG_FILE}
          echo "  jpa:" >> ${APP_CONFIG_FILE}
          echo "    show-sql: false" >> ${APP_CONFIG_FILE}
          echo "    generate-ddl: false" >> ${APP_CONFIG_FILE}
          echo "    hibernate:" >> ${APP_CONFIG_FILE}
          echo "      ddl-auto: none" >> ${APP_CONFIG_FILE}
          echo "management:" >> ${APP_CONFIG_FILE}
          echo "  metrics:" >> ${APP_CONFIG_FILE}
          echo "    tags:" >> ${APP_CONFIG_FILE}
          echo "      application: ${{ env.SERVICE }}-${{ env.PROFILE }}" >> ${APP_CONFIG_FILE}
          if [[ "${{ env.PROFILE }}" == "prod" ]]; then
            echo "springdoc:" >> ${APP_CONFIG_FILE}
            echo "  swagger-ui:" >> ${APP_CONFIG_FILE}
            echo "    enabled: false" >> ${APP_CONFIG_FILE}
            echo "  api-docs:" >> ${APP_CONFIG_FILE}
            echo "    enabled: false" >> ${APP_CONFIG_FILE}
          fi

      # application-S3.properties 생성
      - name: Create application-s3.properties
        env: # 환경 변수로 GitHub Secrets 값을 읽어옵니다.
          APP_CONFIG_FILE: src/main/resources/secret/application-s3.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "cloud.aws.credentials.access-key=${{ secrets.AWS_S3_ACCESS_KEY_ID }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.credentials.secret-key=${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.stack.auto=false" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.s3.bucket=${{ secrets.S3_BUCKET }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.region.static=${{ secrets.AWS_REGION }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.s3.bucket.url=${{ secrets.S3_BUCKET_URL }}" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.s3.signature-version=v4" >> ${APP_CONFIG_FILE}
          echo "cloud.aws.s3.profile=${{ env.PROFILE }}" >> ${APP_CONFIG_FILE}

      # api-key.properties 생성
      - name: Create api-key.properties
        env: # 환경 변수로 GitHub Secrets 값을 읽어옵니다.
          APP_CONFIG_FILE: src/main/resources/secret/api-key.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "kakao.rest.key=${{ secrets.KAKAO_REST_KEY }}" >> ${APP_CONFIG_FILE}

      # jwt key 생성
      - name: Create jwt-secret-keys.properties
        env:
          APP_CONFIG_FILE: src/main/resources/secret/jwt-secret-key.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "jwt.secret=${{ secrets.JWT_SECRET_KEY }}" >> ${APP_CONFIG_FILE}

      # aes-key.properties 생성
      - name: Create aes-key.properties
        env: # 환경 변수로 GitHub Secrets 값을 읽어옵니다.
          APP_CONFIG_FILE: src/main/resources/secret/aes-key.properties
        run: |
          mkdir -p $(dirname ${APP_CONFIG_FILE}) # 디렉토리가 없으면 생성
          echo "security.aes.algorithm=${{ secrets.AES_ALGORITHM }}" >> ${APP_CONFIG_FILE}
          echo "security.aes.key=${{ secrets.AES_KEY }}" >> ${APP_CONFIG_FILE}
          echo "security.aes.iv=${{ secrets.AES_IV }}" >> ${APP_CONFIG_FILE}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to AWS ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Gradle project
        run: |
          ./gradlew build

      - name: Build and Push Docker image (multi-platform)
        run: |
          docker buildx create --use --name mybuilder --driver docker-container --driver-opt network=host || docker buildx use mybuilder

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t ${{ env.ECR_URI }}:${{ env.PROFILE }}-latest \
            --push .

      - name: Move new cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    runs-on: ubuntu-latest
    needs:
      - setup-env
      - build
    env:
        PROFILE: ${{ needs.setup-env.outputs.profile }}
        SERVICE: ${{ needs.setup-env.outputs.service }}
    steps:
      # EC2 인스턴스에 SSH로 접속하여 Docker 이미지 풀 및 실행(prod)
      - name: Deploy to EC2 via SSH
        if: ${{ env.PROFILE == 'prod' }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            # AWS CLI로 ECR 로그인
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            
            # 기존 컨테이너가 있다면 종료하고 삭제
            docker stop ${{ env.SERVICE }}-${{ env.PROFILE }} || true
            docker rm ${{ env.SERVICE }}-${{ env.PROFILE }} || true
            docker image prune -f
            
            # ECR에서 Docker 이미지 풀
            docker pull ${{ env.ECR_URI }}:${{ env.PROFILE }}-latest

            # Docker 컨테이너 실행
            docker run -d \
            --name ${{ env.SERVICE }}-${{ env.PROFILE }} \
            --restart unless-stopped \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=${{ env.PROFILE }} \
            ${{ env.ECR_URI }}:${{ env.PROFILE }}-latest

      - name: Deploy to MAC via SSH
        if: ${{ env.PROFILE == 'prod' }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OPM_HOST }}
          username: ${{ secrets.OPM_USERNAME }}
          password: ${{ secrets.OPM_PASSWORD }}
          port: ${{ secrets.MAC_PORT }}
          script: |
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
            set -e
            
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
            export AWS_REGION=${{ secrets.AWS_REGION }}
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            
            docker stop ${{ env.SERVICE }}-${{ env.PROFILE }} || true
            docker rm ${{ env.SERVICE }}-${{ env.PROFILE }} || true
            docker image prune -f
            
            docker pull ${{ env.ECR_URI }}:${{ env.PROFILE }}-latest

            docker run -d \
            --name ${{ env.SERVICE }}-${{ env.PROFILE }} \
            --restart unless-stopped \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=${{ env.PROFILE }} \
            ${{ env.ECR_URI }}:${{ env.PROFILE }}-latest

      # OPM 서버에 SSH로 접속하여 Docker 이미지 풀 및 실행(dev)
      - name: Deploy to OPM via SSH
        if: ${{ env.PROFILE == 'dev' }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OPM_HOST }}
          username: ${{ secrets.OPM_USERNAME }}
          password: ${{ secrets.OPM_PASSWORD }}
          port: ${{ secrets.OPM_PORT }}
          script: |
            # AWS CLI로 ECR 로그인
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
            export AWS_REGION=${{ secrets.AWS_REGION }}
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
            
            # 기존 컨테이너가 있다면 종료하고 삭제
            docker stop ${{ env.SERVICE }}-${{ env.PROFILE }} || true
            docker rm ${{ env.SERVICE }}-${{ env.PROFILE }} || true
            docker image prune -f
            
            # ECR에서 Docker 이미지 풀
            docker pull ${{ env.ECR_URI }}:${{ env.PROFILE }}-latest

            # Docker 컨테이너 실행
            docker run -d \
            --name ${{ env.SERVICE }}-${{ env.PROFILE }} \
            --restart unless-stopped \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=${{ env.PROFILE }} \
            ${{ env.ECR_URI }}:${{ env.PROFILE }}-latest
