spring:
  datasource:
    main:
      url: jdbc:h2:mem:maindb
      driver-class-name: org.h2.Driver
      username: sa
      password:
    auth:
      url: jdbc:h2:mem:authdb
      driver-class-name: org.h2.Driver
      username: sa
      password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true